<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Чтение 6 класс</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f0f4f8;
      padding: 30px 20px;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 700px;
      width: 100%;
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      padding: 30px 30px 40px;
    }
    h1 {
      font-size: 28px;
      color: #1e293b;
      border-bottom: 3px solid #3b82f6;
      padding-bottom: 12px;
      margin-bottom: 25px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    h1 small {
      font-size: 16px;
      font-weight: normal;
      color: #64748b;
      margin-left: auto;
    }
    .link-list {
      list-style: none;
      margin-bottom: 20px;
    }
    .link-item {
      background: #f8fafc;
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.2s;
      border: 1px solid #e2e8f0;
      flex-wrap: wrap;
    }
    .link-item:hover {
      background: #f1f5f9;
      border-color: #cbd5e1;
    }
    .link-item .link-info {
      flex: 1;
      min-width: 150px;
    }
    .link-item .link-info a {
      font-size: 18px;
      font-weight: 500;
      color: #1e293b;
      text-decoration: none;
      word-break: break-all;
      transition: color 0.2s;
    }
    .link-item .link-info a:hover {
      color: #3b82f6;
      text-decoration: underline;
    }
    .link-item .link-info .url-meta {
      display: block;
      font-size: 13px;
      color: #94a3b8;
      margin-top: 2px;
      word-break: break-all;
    }
    .empty-message {
      text-align: center;
      color: #94a3b8;
      padding: 20px 0;
      font-style: italic;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📖 Чтение 6 класс <small>оглавление</small></h1>

  <ul class="link-list" id="linkList"></ul>
</div>

<script>
  // ============================================================
  //  ОСНОВНОЙ МАССИВ СО ССЫЛКАМИ — РЕДАКТИРУЙТЕ ЕГО ВРУЧНУЮ
  //  Формат: { id: 'уникальный_идентификатор', name: 'Название', url: 'https://...' }
  //  id можно генерировать вручную (например, '1', '2'...) — они нужны для внутренней логики.
  //  При добавлении новой ссылки просто вставьте новый объект внутрь массива.
  //  После сохранения файла список автоматически отсортируется по алфавиту.
  // ============================================================
  const links = [
    { id: '1', name: 'Золотой петушок', url: 'zolotoy_petushok/Золотой петушок.html' },
    { id: '2', name: 'Азбука', url: 'https://example.com/chapter1' },
    { id: '3', name: 'Название', url: 'https://example.com/chapter2' },
    
    // Добавляйте новые ссылки сюда, соблюдая формат
  ];
  // ============================================================

  // Дальше код работает автоматически — ничего не трогаем.

  const listEl = document.getElementById('linkList');

  function escapeHtml(text) {
    if (!text) return '';
    const map = {
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#039;'
    };
    return text.replace(/[&<>"']/g, function(m) { return map[m]; });
  }

  function render() {
    if (!listEl) return;

    // Сортировка по названию (без учёта регистра)
    const sorted = [...links].sort((a, b) =>
      a.name.localeCompare(b.name, undefined, { sensitivity: 'base' })
    );

    if (sorted.length === 0) {
      listEl.innerHTML = `<li class="empty-message">📭 В списке пока нет ссылок.</li>`;
      return;
    }

    let html = '';
    sorted.forEach(link => {
      const name = link.name || 'Без названия';
      const url = link.url || '#';
      html += `
        <li class="link-item">
          <div class="link-info">
            <a href="${escapeHtml(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(name)}</a>
            <span class="url-meta">${escapeHtml(url)}</span>
          </div>
        </li>
      `;
    });

    listEl.innerHTML = html;
  }

  // Запускаем рендеринг при загрузке
  render();
</script>
</body>
</html>
